{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Вход — Lume</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="{% static 'styles.css' %}" />
    <style>
        .auth-container {
            max-width: 500px;
            margin: 80px auto;
            padding: 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        .auth-container h2 {
            text-align: center;
            color: var(--accent-blue);
            margin-bottom: 30px;
            font-size: 28px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-dark);
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            transition: var(--transition);
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--accent-gold);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2);
        }
        .btn-auth {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-gold);
            color: var(--primary-dark);
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-auth:hover {
            background-color: transparent;
            color: var(--accent-gold);
            border: 2px solid var(--accent-gold);
        }
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 15px;
        }
        .auth-footer a {
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: 600;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
        .error-message {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }
        .success-message {
            color: #27ae60;
            font-size: 14px;
            margin-top: 15px;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>
<header>
    <div class="container header-container">
        <a href="{% url 'home' %}" class="logo">
            <i class="fas fa-crown"></i>L<span>ume</span>
        </a>
        <nav>
            <ul>
                <li><a href="{% url 'home' %}">Главная</a></li>
                <li><a href="{% url 'catalog' %}">Каталог</a></li>
                <li><a href="{% url 'home' %}#categories">Категории</a></li>
                <li><a href="{% url 'home' %}#about">О нас</a></li>
                <li><a href="{% url 'home' %}#contact">Контакты</a></li>
            </ul>
        </nav>
        <div class="nav-icons">
            <a href="{% url 'catalog' %}"><i class="fas fa-search"></i></a>
            <a href="{% url 'login' %}"><i class="fas fa-user"></i></a>
            <a href="{% url 'cart' %}"><i class="fas fa-shopping-bag"></i></a>
        </div>
    </div>
</header>

<div class="container">
    <div class="auth-container">
        <h2>Войти в аккаунт</h2>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required />
                <div class="error-message" id="emailError"></div>
            </div>

            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" required />
                <div class="error-message" id="passwordError"></div>
            </div>

            <button type="submit" class="btn-auth">Войти</button>
        </form>

        <div class="success-message" id="successMessage"></div>

        <div class="auth-footer">
            Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a>
        </div>
    </div>
</div>

<script>
const existingUser = localStorage.getItem('lume_current_user');
const existingAccess = localStorage.getItem('lume_access_token');

if (existingUser && existingAccess) {
    window.location.href = "{% url 'home' %}";
}

document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    const emailError = document.getElementById('emailError');
    const passwordError = document.getElementById('passwordError');
    const successMessage = document.getElementById('successMessage');

    [emailError, passwordError].forEach(el => {
        el.style.display = 'none';
        el.textContent = '';
    });
    successMessage.style.display = 'none';
    successMessage.textContent = '';

    let valid = true;

    if (!email || !/^\S+@\S+\.\S+$/.test(email)) {
        emailError.textContent = 'Введите корректный email';
        emailError.style.display = 'block';
        valid = false;
    }

    if (!password) {
        passwordError.textContent = 'Введите пароль';
        passwordError.style.display = 'block';
        valid = false;
    }

    if (!valid) return;

    try {
        const response = await fetch('/api/accounts/login/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                email: email,
                password: password
            })
        });

        const data = await response.json();

        if (!response.ok) {
            passwordError.textContent = data.detail || 'Неверный email или пароль';
            passwordError.style.display = 'block';
            return;
        }

        localStorage.setItem('lume_access_token', data.access);
        localStorage.setItem('lume_refresh_token', data.refresh);

        const profileResponse = await fetch('/api/accounts/profile/', {
            method: 'GET',
            headers: {
                'Authorization': `Bearer ${data.access}`
            }
        });

        if (!profileResponse.ok) {
            passwordError.textContent = 'Не удалось получить профиль пользователя';
            passwordError.style.display = 'block';
            return;
        }

        const profile = await profileResponse.json();

        localStorage.setItem('lume_current_user', JSON.stringify({
            id: profile.id,
            email: profile.email,
            full_name: profile.full_name,
            role: profile.role
        }));

        successMessage.textContent = `Вы вошли как ${profile.full_name || profile.email}`;
        successMessage.style.display = 'block';

        setTimeout(() => {
            window.location.href = "{% url 'home' %}";
        }, 1000);

    } catch (error) {
        passwordError.textContent = 'Ошибка соединения с сервером';
        passwordError.style.display = 'block';
        console.error(error);
    }
});
</script>
</body>
</html>
