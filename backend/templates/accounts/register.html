{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Регистрация — Lume</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="{% static 'styles.css' %}" />
    <style>
        .auth-container {
            max-width: 500px;
            margin: 80px auto;
            padding: 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        .auth-container h2 {
            text-align: center;
            color: var(--accent-blue);
            margin-bottom: 30px;
            font-size: 28px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-dark);
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            transition: var(--transition);
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--accent-gold);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2);
        }
        .btn-auth {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-gold);
            color: var(--primary-dark);
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-auth:hover {
            background-color: transparent;
            color: var(--accent-gold);
            border: 2px solid var(--accent-gold);
        }
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 15px;
        }
        .auth-footer a {
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: 600;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
        .error-message {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }
        .success-message {
            color: #27ae60;
            font-size: 14px;
            margin-top: 15px;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>
<header>
    <div class="container header-container">
        <a href="{% url 'home' %}" class="logo">
            <i class="fas fa-crown"></i>L<span>ume</span>
        </a>
        <nav>
            <ul>
                <li><a href="{% url 'home' %}">Главная</a></li>
                <li><a href="{% url 'catalog' %}">Каталог</a></li>
                <li><a href="{% url 'home' %}#categories">Категории</a></li>
                <li><a href="{% url 'home' %}#about">О нас</a></li>
                <li><a href="{% url 'home' %}#contact">Контакты</a></li>
            </ul>
        </nav>
        <div class="nav-icons">
            <a href="{% url 'catalog' %}"><i class="fas fa-search"></i></a>
            <a href="{% url 'login' %}"><i class="fas fa-user"></i></a>
            <a href="{% url 'cart' %}"><i class="fas fa-shopping-bag"></i></a>
        </div>
    </div>
</header>

<div class="container">
    <div class="auth-container">
        <h2>Создать аккаунт</h2>

        <form id="registerForm">
            <div class="form-group">
                <label for="full_name">Имя</label>
                <input type="text" id="full_name" required />
                <div class="error-message" id="fullNameError"></div>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required />
                <div class="error-message" id="emailError"></div>
            </div>

            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" minlength="8" required />
                <div class="error-message" id="passwordError"></div>
            </div>

            <div class="form-group">
                <label for="password2">Подтвердите пароль</label>
                <input type="password" id="password2" minlength="8" required />
                <div class="error-message" id="password2Error"></div>
            </div>

            <button type="submit" class="btn-auth">Зарегистрироваться</button>
        </form>

        <div class="success-message" id="successMessage"></div>

        <div class="auth-footer">
            Уже есть аккаунт? <a href="{% url 'login' %}">Войти</a>
        </div>
    </div>
</div>

<script>
const regExistingUser = localStorage.getItem('lume_current_user');
const regExistingAccess = localStorage.getItem('lume_access_token');

if (regExistingUser && regExistingAccess) {
    window.location.href = "{% url 'home' %}";
}

document.getElementById('registerForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const fullName = document.getElementById('full_name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const password2 = document.getElementById('password2').value;

    const fullNameError = document.getElementById('fullNameError');
    const emailError = document.getElementById('emailError');
    const passwordError = document.getElementById('passwordError');
    const password2Error = document.getElementById('password2Error');
    const successMessage = document.getElementById('successMessage');

    [fullNameError, emailError, passwordError, password2Error].forEach(el => {
        el.style.display = 'none';
        el.textContent = '';
    });
    successMessage.style.display = 'none';
    successMessage.textContent = '';

    let valid = true;

    if (!fullName) {
        fullNameError.textContent = 'Введите имя';
        fullNameError.style.display = 'block';
        valid = false;
    }

    if (!email || !/^\S+@\S+\.\S+$/.test(email)) {
        emailError.textContent = 'Введите корректный email';
        emailError.style.display = 'block';
        valid = false;
    }

    if (!password || password.length < 8) {
        passwordError.textContent = 'Пароль должен быть не менее 8 символов';
        passwordError.style.display = 'block';
        valid = false;
    }

    if (password !== password2) {
        password2Error.textContent = 'Пароли не совпадают';
        password2Error.style.display = 'block';
        valid = false;
    }

    if (!valid) return;

    try {
        const registerResponse = await fetch('/api/accounts/register/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                full_name: fullName,
                email: email,
                password: password,
                role: 'customer'
            })
        });

        const registerData = await registerResponse.json();

        if (!registerResponse.ok) {
            if (registerData.email) {
                emailError.textContent = Array.isArray(registerData.email) ? registerData.email[0] : registerData.email;
                emailError.style.display = 'block';
            } else if (registerData.password) {
                passwordError.textContent = Array.isArray(registerData.password) ? registerData.password[0] : registerData.password;
                passwordError.style.display = 'block';
            } else {
                alert(JSON.stringify(registerData));
            }
            return;
        }

        const loginResponse = await fetch('/api/accounts/login/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                email: email,
                password: password
            })
        });

        const loginData = await loginResponse.json();

        if (!loginResponse.ok) {
            alert('Аккаунт создан, но автоматический вход не выполнен.');
            window.location.href = "{% url 'login' %}";
            return;
        }

        localStorage.setItem('lume_access_token', loginData.access);
        localStorage.setItem('lume_refresh_token', loginData.refresh);
        localStorage.setItem('lume_current_user', JSON.stringify({
            id: registerData.id,
            email: registerData.email,
            full_name: registerData.full_name,
            role: registerData.role
        }));

        successMessage.textContent = `Регистрация успешна. Вы вошли как ${registerData.full_name || registerData.email}`;
        successMessage.style.display = 'block';

        setTimeout(() => {
            window.location.href = "{% url 'home' %}";
        }, 1000);

    } catch (error) {
        alert('Ошибка соединения с сервером');
        console.error(error);
    }
});
</script>
</body>
</html>
