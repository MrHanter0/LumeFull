{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина — Lume</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'styles.css' %}">
    <style>
        .cart-page {
            padding: 50px 0 70px;
            min-height: 70vh;
        }

        .cart-header-block {
            margin-bottom: 30px;
        }

        .cart-header-block h1 {
            font-size: 36px;
            margin-bottom: 10px;
            color: var(--accent-blue);
        }

        .cart-header-block p {
            color: #666;
            font-size: 16px;
        }

        #cartContent {
            display: grid;
            gap: 24px;
        }

        .cart-items {
            display: grid;
            gap: 20px;
        }

        .cart-item {
            display: grid;
            grid-template-columns: 180px 1fr;
            gap: 20px;
            background: #fff;
            border-radius: 18px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .cart-item-img {
            width: 100%;
            height: 220px;
            overflow: hidden;
            border-radius: 14px;
            background: #f7f7f7;
        }

        .cart-item-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .cart-item-info {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            flex-wrap: wrap;
        }

        .cart-item-category {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 999px;
            background: #f1f1f1;
            font-size: 13px;
            margin-bottom: 10px;
        }

        .cart-item-info h3 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .cart-item-price {
            margin-top: 12px;
            font-size: 24px;
            font-weight: 700;
            color: var(--accent-blue);
        }

        .cart-item-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            align-self: center;
            flex-wrap: wrap;
        }

        .quantity-btn,
        .remove-btn {
            border: none;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .quantity-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--accent-gold);
            color: var(--primary-dark);
            font-size: 20px;
            font-weight: 700;
        }

        .quantity-btn:hover {
            transform: scale(1.05);
        }

        .quantity-display {
            min-width: 36px;
            text-align: center;
            font-size: 18px;
            font-weight: 700;
        }

        .remove-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: #f8d7da;
            color: #842029;
            font-size: 16px;
        }

        .remove-btn:hover {
            transform: scale(1.05);
        }

        .cart-summary {
            background: #fff;
            border-radius: 18px;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            max-width: 420px;
            justify-self: end;
            width: 100%;
        }

        .cart-summary h3 {
            font-size: 26px;
            margin-bottom: 20px;
        }

        .summary-row,
        .total-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }

        .total-row {
            font-size: 22px;
            font-weight: 700;
            border-bottom: none;
            padding-top: 18px;
        }

        .checkout-btn,
        .continue-shopping {
            display: inline-block;
            width: 100%;
            text-align: center;
            margin-top: 14px;
            padding: 14px 18px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 700;
            transition: 0.2s ease;
        }

        .checkout-btn {
            border: none;
            cursor: pointer;
            background: var(--accent-gold);
            color: var(--primary-dark);
        }

        .continue-shopping {
            border: 2px solid var(--accent-gold);
            color: var(--accent-gold);
            background: transparent;
        }

        .empty-cart {
            background: #fff;
            border-radius: 18px;
            padding: 40px 24px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .empty-cart p {
            font-size: 22px;
            margin-bottom: 20px;
        }

        @media (max-width: 900px) {
            .cart-item {
                grid-template-columns: 1fr;
            }

            .cart-item-img {
                height: 260px;
            }

            .cart-summary {
                justify-self: stretch;
                max-width: none;
            }
        }
    </style>
</head>
<body>
<header>
    <div class="container header-container">
        <a href="{% url 'home' %}" class="logo">
            <i class="fas fa-crown"></i>L<span>ume</span>
        </a>

        <button class="mobile-menu-btn">
            <i class="fas fa-bars"></i>
        </button>

        <nav>
            <ul>
                <li><a href="{% url 'home' %}">Главная</a></li>
                <li><a href="{% url 'catalog' %}">Каталог</a></li>
                <li><a href="{% url 'profile' %}">Кабинет</a></li>
                <li><a href="{% url 'cart' %}">Корзина</a></li>
            </ul>
        </nav>

        <div class="nav-icons">
            <a href="{% url 'catalog' %}"><i class="fas fa-search"></i></a>
            <a href="{% url 'profile' %}"><i class="fas fa-user"></i></a>
            <a href="{% url 'cart' %}"><i class="fas fa-shopping-bag"></i></a>
        </div>
    </div>
</header>

<section class="cart-page">
    <div class="container">
        <div class="cart-header-block">
            <h1>Корзина</h1>
            <p>Проверьте выбранные товары перед оформлением заказа.</p>
        </div>

        <div id="cartContent"></div>
    </div>
</section>

<script src="{% static 'script.js' %}?v=8"></script>
<script src="{% static 'cart.js' %}?v=9"></script>
</body>
</html>
