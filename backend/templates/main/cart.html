{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Корзина — Lume</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="{% static 'styles.css' %}" />
    <style>
        .cart-container {
            padding: 60px 0;
        }
        .cart-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .cart-header h1 {
            font-size: 36px;
            color: var(--accent-blue);
        }
        .empty-cart {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dark);
            font-size: 18px;
        }
        .cart-items {
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin-bottom: 30px;
        }
        .cart-item {
            display: flex;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: var(--transition);
        }
        .cart-item:hover {
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .cart-item-img {
            width: 180px;
            height: 180px;
            flex-shrink: 0;
        }
        .cart-item-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .cart-item-info {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .cart-item-info h3 {
            font-size: 18px;
            margin-bottom: 8px;
            color: var(--text-dark);
        }
        .cart-item-category {
            display: inline-block;
            background-color: var(--gray-light);
            color: var(--accent-blue);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 13px;
            margin-bottom: 10px;
        }
        .cart-item-price {
            color: var(--accent-blue);
            font-weight: 700;
            font-size: 18px;
            margin: 10px 0;
        }
        .cart-item-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .quantity-btn {
            width: 32px;
            height: 32px;
            background: #f1f1f1;
            border: none;
            border-radius: 50%;
            font-weight: bold;
            cursor: pointer;
            transition: var(--transition);
        }
        .quantity-btn:hover {
            background: var(--accent-gold);
            color: var(--primary-dark);
        }
        .quantity-display {
            font-size: 16px;
            min-width: 24px;
            text-align: center;
        }
        .remove-btn {
            background: none;
            border: none;
            color: #e74c3c;
            font-size: 16px;
            cursor: pointer;
            margin-left: auto;
            transition: var(--transition);
        }
        .remove-btn:hover {
            color: #c0392b;
        }
        .cart-summary {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            max-width: 400px;
            margin-left: auto;
        }
        .cart-summary h3 {
            font-size: 22px;
            color: var(--accent-blue);
            margin-bottom: 15px;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .total-row {
            font-weight: 700;
            font-size: 20px;
            color: var(--accent-blue);
            border-top: 1px solid #eee;
            padding-top: 15px;
            margin-top: 10px;
        }
        .checkout-btn {
            display: block;
            width: 100%;
            padding: 14px;
            background-color: var(--accent-gold);
            color: var(--primary-dark);
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: var(--transition);
        }
        .checkout-btn:hover {
            background: transparent;
            color: var(--accent-gold);
            border: 2px solid var(--accent-gold);
        }
        .continue-shopping {
            display: inline-block;
            margin-top: 20px;
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: 600;
        }
        .continue-shopping:hover {
            text-decoration: underline;
        }

        /* Адаптив */
        @media (max-width: 768px) {
            .cart-item {
                flex-direction: column;
            }
            .cart-item-img {
                width: 100%;
                height: 200px;
            }
            .cart-summary {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
<header>
    <div class="container header-container">
        <a href="{% url 'home' %}" class="logo">
            <i class="fas fa-crown"></i>L<span>ume</span>
        </a>
        
        <button class="mobile-menu-btn">
            <i class="fas fa-bars"></i>
        </button>
        
        <nav>
            <ul>
                <li><a href="{% url 'home' %}">Главная</a></li>
                <li><a href="{% url 'catalog' %}">Каталог</a></li> <!-- ← изменено -->
                <li><a href="{% url 'home' %}#categories">Категории</a></li>
                <li><a href="{% url 'home' %}#about">О нас</a></li>
                <li><a href="{% url 'home' %}#contact">Контакты</a></li>
            </ul>
        </nav>
        
        <div class="nav-icons">
            <a href="{% url 'catalog' %}"><i class="fas fa-search"></i></a> <!-- поиск тоже ведёт в каталог -->
            <a href="{% url 'login' %}"><i class="fas fa-user"></i></a>
            <a href="{% url 'cart' %}"><i class="fas fa-shopping-bag"></i></a>
        </div>
    </div>
</header>

    <div class="container cart-container">
        <div class="cart-header">
            <h1>Ваша корзина</h1>
        </div>

        <div id="cartContent">
            <!-- Сюда будет подгружаться содержимое -->
        </div>
    </div>

    <script src="{% static 'cart.js' %}?v=3"></script>
</body>
</html>
