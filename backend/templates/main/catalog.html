{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Каталог — Lume</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="{% static 'styles.css' %}" />
    <style>
        .filters {
            display: flex;
            gap: 15px;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 8px 16px;
            background: var(--gray-light);
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }
        .filter-btn.active, .filter-btn:hover {
            background: var(--accent-gold);
            color: var(--primary-dark);
        }
        #productsGrid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            margin-bottom: 60px;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="container header-container">
            <a href="{% url 'home' %}" class="logo">
                <i class="fas fa-crown"></i>L<span>ume</span>
            </a>
            <nav>
                <ul>
                    <li><a href="{% url 'home' %}#home">Главная</a></li>
                    <li><a href="{% url 'catalog' %}">Товары</a></li>
                    <li><a href="{% url 'home' %}#categories">Категории</a></li>
                    <li><a href="{% url 'home' %}#about">О нас</a></li>
                    <li><a href="{% url 'home' %}#contact">Контакты</a></li>
                </ul>
            </nav>
            <div class="nav-icons">
                <a href="{% url 'catalog' %}"><i class="fas fa-search"></i></a>
                <a href="{% url 'login' %}"><i class="fas fa-user"></i></a>
                <a href="{% url 'cart' %}"><i class="fas fa-shopping-bag"></i></a>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="section-title">
            <h2>Каталог товаров</h2>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-category="all">Все</button>
            <button class="filter-btn" data-category="Пальто">Пальто</button>
            <button class="filter-btn" data-category="Свитер">Свитера</button>
            <button class="filter-btn" data-category="Брюки">Брюки</button>
            <button class="filter-btn" data-category="Платья">Платья</button>
        </div>

        <div id="productsGrid"></div>
    </div>

    <!-- Модальное окно выбора опций -->
    <div id="productModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:10000; justify-content:center; align-items:center;">
        <div style="background:white; padding:30px; border-radius:12px; max-width:500px; width:90%;">
            <h3 id="modalProductName"></h3>
            <img id="modalProductImage" src="" alt="" style="width:100%; height:200px; object-fit:cover; border-radius:8px; margin:15px 0;">
            
            <div>
                <p><strong>Размер:</strong></p>
                <div id="sizeOptions"></div>
            </div>
            <div style="margin-top:15px;">
                <p><strong>Цвет:</strong></p>
                <div id="colorOptions"></div>
            </div>
            <div style="margin-top:15px;">
                <label>Количество: 
                    <input type="number" id="quantityInput" min="1" value="1" style="width:60px; padding:5px; margin-left:10px;">
                </label>
            </div>
            <div style="margin-top:20px; display:flex; gap:10px;">
                <button id="addToCartFromModal" class="btn" style="flex:1;">Добавить в корзину</button>
                <button id="closeModal" class="btn btn-outline" style="flex:1;">Отмена</button>
            </div>
        </div>
    </div>

    <script src="{% static 'data.js' %}?v=3"></script>
    <script src="{% static 'catalog.js' %}?v=3"></script>
</body>
</html>
