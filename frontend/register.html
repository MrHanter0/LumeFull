<!DOCTYPE html>
{% load static %}
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Регистрация — Lume</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="{% static 'styles.css' %}">
    <style>
        .auth-container {
            max-width: 500px;
            margin: 80px auto;
            padding: 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        .auth-container h2 {
            text-align: center;
            color: var(--accent-blue);
            margin-bottom: 30px;
            font-size: 28px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-dark);
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            transition: var(--transition);
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--accent-gold);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2);
        }
        .btn-auth {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-gold);
            color: var(--primary-dark);
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-auth:hover {
            background-color: transparent;
            color: var(--accent-gold);
            border: 2px solid var(--accent-gold);
        }
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 15px;
        }
        .auth-footer a {
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: 600;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
        .error-message {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="container header-container">
            <a href="/" class="logo">
                <i class="fas fa-crown"></i>L<span>ume</span>
            </a>
            <nav>
                <ul>
                    <li><a href="/">Главная</a></li>
                    <li><a href="/catalog/">Каталог</a></li>
                    <li><a href="index.html#categories">Категории</a></li>
                    <li><a href="index.html#about">О нас</a></li>
                    <li><a href="index.html#contact">Контакты</a></li>
                </ul>
            </nav>
            <div class="nav-icons">
                <a href="/catalog/"><i class="fas fa-search"></i></a>
                <a href="/login/"><i class="fas fa-user"></i></a>
                <a href="/cart/"><i class="fas fa-shopping-bag"></i></a>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="auth-container">
            <h2>Создать аккаунт</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required />
                    <div class="error-message" id="emailError"></div>
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" minlength="6" required />
                    <div class="error-message" id="passwordError"></div>
                </div>
                <button type="submit" class="btn-auth">Зарегистрироваться</button>
            </form>
            <div class="auth-footer">
                Уже есть аккаунт? <a href="/login/">Войти</a>
            </div>
        </div>
    </div>

    <script src="{% static 'auth.js' %}"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const emailError = document.getElementById('emailError');
            const passwordError = document.getElementById('passwordError');

            emailError.style.display = 'none';
            passwordError.style.display = 'none';

            let valid = true;

            if (!email || !/^\S+@\S+\.\S+$/.test(email)) {
                emailError.textContent = 'Введите корректный email';
                emailError.style.display = 'block';
                valid = false;
            }

            if (password.length < 6) {
                passwordError.textContent = 'Пароль должен быть не менее 6 символов';
                passwordError.style.display = 'block';
                valid = false;
            }

            if (!valid) return;

            if (saveUser(email, password)) {
                setCurrentUser(email);
                alert('Регистрация успешна! Добро пожаловать в Lume.');
                window.location.href = 'index.html';
            } else {
                emailError.textContent = 'Пользователь с таким email уже существует';
                emailError.style.display = 'block';
            }
        });
    </script>
</body>
</html>
